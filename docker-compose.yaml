x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4-python3.12
#  env_file:
#    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres_meta:5432/${POSTGRES_DB:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-sg700aM_eiUTe40yMk6BgmphIE5owAdlJQCh4X6vfOI=""}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    _PIP_ADDITIONAL_REQUIREMENTS: "pymongo faker python-dotenv pandas numpy apache-airflow-providers-mongo==4.1.2 apache-airflow-providers-postgres"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-1000}:0"
  depends_on:
    postgres_meta:
      condition: service_healthy

services:
  postgres_meta:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}", "-d", "${POSTGRES_DB:-airflow}"]
      interval: 10s
      retries: 5

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        airflow db upgrade
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME:-admin}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD:-admin}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
    user: "0:0"

  postgres_dwh:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_DWH_USER:-dwh_user}
      POSTGRES_PASSWORD: ${POSTGRES_DWH_PASSWORD:-dwh_password}
      POSTGRES_DB: ${POSTGRES_DWH_DB:-dwh_db}
    ports:
      - "${POSTGRES_DWH_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - ./sql/init_dwh.sql:/docker-entrypoint-initdb.d/init_dwh.sql

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
    ports:
      - "${MONGO_EXTERNAL_PORT:-27017}:27017"
